<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pay Online</title>
<style>
html,
body {
  margin: 0;
  padding: 0;
  background: transparent;
}
.full-image {
  width: 100%;
  height: 100%;
}
.full-img {
  display: block;
  width: 100%;
  height: auto;
  max-width: 400px;
  cursor: pointer;
  border: 0;
}
</style>
<script>
window.addEventListener("message", receiveMessage, false);
function postClickEvent() {
  var targetWindow = parent;
  if (!targetWindow) {
    targetWindow = window;
  }
  targetWindow.postMessage({ click: "eCommerceButton" }, "*");
}
function receiveMessage(event) {
  console.log(event);
}
</script>
</head>
<body>
<div class="full-image">
<img
  class="full-img"
  src="https://s3-ap-southeast-1.amazonaws.com/staging-websites/presto-shopping/pay-bill-online-2.png"
  width="400"
  height="90"
  alt="Pay Online / Renew Plan"
  onclick="postClickEvent()">
</div>
</body>
</html>
